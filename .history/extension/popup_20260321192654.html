<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTalk AI</title>
  <style>
    :root {
      --bg: #f5efe4;
      --ink: #1d1a16;
      --muted: #645c52;
      --card: rgba(255, 250, 242, 0.9);
      --line: rgba(55, 42, 29, 0.12);
      --accent: #c84f2f;
      --accent-strong: #9d3419;
      --accent-soft: #f3c7ae;
      --success: #2d6a4f;
      --shadow: 0 18px 40px rgba(64, 41, 21, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 380px;
      min-height: 520px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 38%),
        radial-gradient(circle at bottom right, rgba(200, 79, 47, 0.16), transparent 35%),
        linear-gradient(160deg, #efe4d0 0%, #f8f2e8 52%, #ecdcc7 100%);
      overflow: hidden;
    }

    .shell {
      position: relative;
      min-height: 520px;
      padding: 22px;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(2px);
    }

    .shell::before {
      top: -28px;
      right: -12px;
      width: 130px;
      height: 130px;
      background: rgba(200, 79, 47, 0.14);
    }

    .shell::after {
      bottom: 88px;
      left: -42px;
      width: 120px;
      height: 120px;
      background: rgba(109, 142, 122, 0.12);
    }

    .panel {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 476px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-strong);
      background: rgba(200, 79, 47, 0.1);
    }

    h1 {
      margin: 10px 0 6px;
      font-size: 28px;
      line-height: 0.95;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .badge {
      flex-shrink: 0;
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, #201c17 0%, #3b3026 100%);
      color: #f8f2e8;
      text-align: center;
      min-width: 82px;
    }

    .badge strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .badge span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .composer {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-wrap {
      position: relative;
    }

    .question-wrap textarea {
      width: 100%;
      min-height: 104px;
      padding: 16px 16px 38px;
      border: 1px solid rgba(80, 61, 44, 0.14);
      border-radius: 18px;
      resize: none;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      line-height: 1.45;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    .question-wrap textarea:focus {
      outline: none;
      border-color: rgba(200, 79, 47, 0.5);
      box-shadow: 0 0 0 4px rgba(200, 79, 47, 0.12);
      transform: translateY(-1px);
    }

    .question-wrap textarea::placeholder {
      color: #8a7c6b;
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8e7d6a;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .actions button {
      flex: 1;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #fff8f2;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(157, 52, 25, 0.24);
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .actions button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(157, 52, 25, 0.28);
    }

    .actions button:disabled {
      cursor: wait;
      opacity: 0.74;
      transform: none;
      box-shadow: 0 8px 18px rgba(157, 52, 25, 0.18);
    }

    .status {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(80, 61, 44, 0.1);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      min-width: 96px;
      text-align: center;
    }

    .status[data-tone="loading"] {
      color: var(--accent-strong);
      background: rgba(243, 199, 174, 0.42);
    }

    .status[data-tone="ready"] {
      color: var(--success);
      background: rgba(45, 106, 79, 0.1);
    }

    .response-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72) 0%, rgba(248, 240, 230, 0.92) 100%);
      border: 1px solid rgba(80, 61, 44, 0.1);
    }

    .response-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .response-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(200, 79, 47, 0.34);
      animation: pulse 1.8s infinite;
    }

    .response {
      margin: 0;
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.6;
      color: #2a241d;
      padding-right: 4px;
    }

    .response.empty {
      color: #7b6d5d;
    }

    .response::-webkit-scrollbar {
      width: 8px;
    }

    .response::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(111, 93, 75, 0.24);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(200, 79, 47, 0.3);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(200, 79, 47, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(200, 79, 47, 0);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="hero">
        <div>
          <span class="eyebrow">Video Companion</span>
          <h1>YouTalk AI</h1>
          <p class="subtitle">Ask what this moment means and get a grounded explanation from the current YouTube scene.</p>
        </div>
        <div class="badge">
          <strong>YT</strong>
          <span>Live</span>
        </div>
      </header>

      <section class="composer">
        <div class="question-wrap">
          <textarea id="question" placeholder="Ask what is happening here, which film this is, or why this scene matters."></textarea>
          <div class="hint">Use the current timestamp as context</div>
        </div>

        <div class="actions">
          <button id="askBtn" type="button">Explain This Moment</button>
          <div class="status" id="status" data-tone="idle">Waiting for your question</div>
        </div>
      </section>

      <section class="response-card">
        <div class="response-head">
          <h2>Answer</h2>
          <div class="pulse" aria-hidden="true"></div>
        </div>
        <p class="response empty" id="response">Your answer will appear here with the video title, timestamp, and visible captions as context.</p>
      </section>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
